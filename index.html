<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Court Sentencing Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- Welcome Page -->
  <section class="page active" id="welcome">
    <h1>⚖️ Court Sentencing Tool</h1>
    <p>
      This tool helps evaluate offences and determine a sentencing range
      based on structured legal guidelines.
    </p>
    <button onclick="nextPage()">Begin</button>
  </section>

  <!-- Offence Selection -->
  <section class="page">
    <h2>Select Offence</h2>
    <select id="offence">
      <option value="">--Choose--</option>
      <option value="Firearms Offence">Firearms Offence</option>
    </select>
    <button onclick="nextPage()">Next</button>
  </section>

  <!-- Consequence Level -->
  <section class="page">
    <h2>Consequence Level</h2>
    <label><input type="radio" name="consequence" value="Lesser"> Lesser</label>
    <label><input type="radio" name="consequence" value="High"> High</label>
    <label><input type="radio" name="consequence" value="Highest"> Highest</label>
    <button onclick="loadConsequencePage()">Next</button>
  </section>

  <!-- Dynamic Consequence Details -->
  <section class="page" id="consequenceDetails"></section>

  <!-- Seriousness Level -->
  <section class="page">
    <h2>Seriousness Level</h2>
    <label><input type="radio" name="seriousness" value="Lesser"> Lesser</label>
    <label><input type="radio" name="seriousness" value="Medium"> Medium</label>
    <label><input type="radio" name="seriousness" value="High"> High</label>
    <button onclick="loadSeriousnessPage()">Next</button>
  </section>

  <!-- Dynamic Seriousness Details -->
  <section class="page" id="seriousnessDetails"></section>

  <!-- Aggravating/Mitigating -->
  <section class="page" id="factorsPage"></section>

  <!-- Credit/Debit -->
  <section class="page" id="creditPage"></section>

  <!-- Final Result -->
  <section class="page" id="resultPage"></section>

</div>

<script src="script.js"></script>
</body>
</html>
